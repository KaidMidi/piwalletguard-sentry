<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PiWalletGuard - Community Security Portal</title>
    <!-- PI SDK OFFICIAL SCRIPT LINK (PRODUCTION COMPLIANT) -->
    <script src="https://minepi.com"></script>
    <style>
        @import url('https://googleapis.com');
        
        /* EMBEDDED DESIGN SYSTEM CORE (STRICT MOBILE CENTERING & RESPONSIVE FIX) */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        html, body {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }

        body { 
            background-color: #0f111a; /* Fond sombre premium inspiré de votre logo */
            min-height: 100vh; 
            color: #1f2937; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start;
            padding: 8px;
        }
        
        /* DYNAMIC SPLASH SCREEN WITH YOUR LOGO */
        .splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1528 0%, #0a0813 100%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease-out;
        }
        
        .splash-logo-container {
            text-align: center;
            animation: pulseLogo 2s infinite ease-in-out;
        }
        
        @keyframes pulseLogo {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(92, 42, 122, 0.4)); }
            50% { transform: scale(1.03); filter: drop-shadow(0 0 30px rgba(255, 179, 0, 0.6)); }
        }

        /* CUSTOM SVG BRAND EMBED (EXACT REPLICA OF YOUR IMAGE SHIELD & PI SYMBOL) */
        .brand-shield-svg {
            width: 130px;
            height: 130px;
            margin-bottom: 20px;
        }
        
        .main-container { 
            width: 100%; 
            max-width: 1150px;
            margin: 0 auto; 
            background: #ffffff; 
            border-radius: 20px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            opacity: 0; /* Apparaît doucement après le Splash Screen */
            transform: translateY(10px);
            transition: all 0.6s ease-out;
        }
        
        .pi-purple-gradient { 
            background: linear-gradient(135deg, #2d1340 0%, #170724 100%); 
            color: #ffffff; 
            border-bottom: 4px solid #ffb300; 
            padding: 14px 20px; 
        }
        
        /* FAKE BROWSER BAR */
        .fake-url-bar { background-color: rgba(23, 7, 36, 0.8); padding: 6px 12px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(92, 42, 122, 0.3); font-size: 11px; color: #e9d5ff; }
        .dots { display: flex; gap: 4px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .url-field { background-color: rgba(15, 5, 24, 0.95); padding: 4px 12px; border-radius: 9999px; flex: 1; max-width: 100%; font-family: monospace; color: #ffb300; text-align: center; font-size: 11px; border: 1px solid rgba(255,179,0,0.2); }
        
        /* BRANDING & HEADER */
        .header-main { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-top: 10px; }
        .brand-zone { display: flex; align-items: center; gap: 12px; }
        .logo-box-mini { width: 42px; height: 42px; }
        
        .pi-gold-btn { background-color: #ffb300; color: #2d1340; font-weight: 800; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; box-shadow: 0 4px 14px rgba(255, 179, 0, 0.3); width: 100%; text-align: center; display: block; text-transform: uppercase; transition: all 0.2s ease; }
        .pi-gold-btn:hover { background-color: #f9a825; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255, 179, 0, 0.5); }
        .lang-dropdown { background-color: #2d1340; border: 1px solid #ffb300; color: #ffffff; padding: 6px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; cursor: pointer; }
        
        /* LAYOUT DISTRIBUTION */
        .main-layout { display: flex; flex-direction: column; gap: 16px; padding: 12px; background-color: #ffffff; width: 100%; }
        
        @media (min-width: 1024px) {
            body { padding: 16px; }
            .main-layout { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; padding: 24px; }
            .left-panel { grid-column: span 5; }
            .right-panel { grid-column: span 7; }
        }
        
        /* COMPONENTS STYLING */
        .form-card { background-color: #f9fafb; border-radius: 16px; padding: 14px; border: 1px solid #f3f4f6; width: 100%; }
        .form-title { font-size: 15px; font-weight: 700; color: #1f2937; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; gap: 8px; }
        
        .form-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 6px; font-size: 12px; width: 100%; }
        .form-group label { font-weight: 600; color: #4b5563; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 12px; border: 1px solid #d1d5db; border-radius: 8px; outline: none; font-size: 12px; background-color: #ffffff; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        
        .input-readonly { background-color: #e5e7eb !important; color: #6b7280; cursor: not-allowed; }
        .dropzone { border: 2px dashed #d1d5db; border-radius: 8px; padding: 14px; text-align: center; cursor: pointer; background: #ffffff; }
        
        .submit-locked { background-color: #d1d5db; color: #6b7280; font-weight: bold; padding: 12px; border-radius: 8px; cursor: not-allowed; text-align: center; border: none; width: 100%; margin-top: 6px; }
        .submit-active { width: 100%; background-color: #ffb300; color: #2d1340; font-weight: bold; padding: 12px; border-radius: 8px; cursor: pointer; border: none; margin-top: 6px; }
        
        /* REGISTRY CARDS */
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e5e7eb; padding-bottom: 8px; margin-bottom: 14px; width: 100%; }
        .badge-count { background-color: #fef2f2; color: #991b1b; padding: 2px 8px; border-radius: 9999px; font-weight: bold; font-size: 10px; border: 1px solid #fee2e2; }
        .scam-card { background-color: #f9fafb; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 10px; font-size: 12px; width: 100%; }
        .wallet-box { font-family: monospace; font-weight: bold; background: #ffffff; padding: 6px; border-radius: 6px; border: 1px solid #e5e7eb; word-break: break-all; font-size: 11px; width: 100%; display: block; }
        
        .badge-recurrence { background-color: #f97316; color: #ffffff; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 10px; display: inline-block; }
        .badge-amount { background-color: #fef2f2; color: #b91c1c; font-weight: 800; padding: 2px 6px; border-radius: 4px; border: 1px solid #fca5a5; display: inline-block; }
        .vote-section { background: #ffffff; padding: 8px; border-radius: 8px; border: 1px solid #e5e7eb; display: flex; flex-direction: column; gap: 8px; }
        
        @media(min-width: 400px) { .vote-section { flex-direction: row; justify-content: space-between; align-items: center; } }
        
        .progress-bar-bg { width: 100%; background-color: #e5e7eb; height: 6px; border-radius: 9999px; overflow: hidden; margin-top: 4px; }
        .progress-bar-fill { height: 100%; background-color: #ef4444; transition: width 0.3s; }
        .vote-btn-group { display: flex; gap: 4px; width: 100%; justify-content: flex-end; }
        .v-btn { padding: 6px 10px; font-size: 11px; font-weight: bold; border-radius: 4px; cursor: pointer; border: 1px solid; flex: 1; max-width: 120px; text-align: center; }
        .v-scam { background-color: #fef2f2; border-color: #fca5a5; color: #991b1b; }
        .v-safe { background-color: #ecfdf5; border-color: #a7f3d0; color: #065f46; }

        .auth-container-box { background-color: #fffbeb; border: 2px solid #fef3c7; padding: 14px; border-radius: 12px; margin-bottom: 12px; text-align: center; width: 100%; }
    </style>
</head>
<body>

    <!-- VISUAL IDENTITY ANIMATED SPLASH SCREEN (REPLICATING YOUR IMAGE) -->
    <div id="splashScreen" class="splash-screen">
        <div class="splash-logo-container">
            <!-- Vector Shield Emblem Match -->
            <svg class="brand-shield-svg" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="#4a157d"/>
                <circle cx="50" cy="50" r="41" fill="#2d0f54" stroke="#ffb300" stroke-width="2"/>
                <path d="M50,22 C65,22 72,27 72,27 C72,55 50,78 50,78 C50,78 28,55 28,27 C28,27 35,22 50,22 Z" fill="#5c1d99" stroke="#ffb300" stroke-width="3"/>
                <path d="M50,25 C62,25 68,29 68,29 C68,52 50,73 50,73 C50,73 32,52 32,29 C32,29 38,25 50,25 Z" fill="#3b1266"/>
                <text x="50" y="59" font-family="'Plus Jakarta Sans', sans-serif" font-size="34" font-weight="400" fill="#ffffff" text-anchor="middle">π</text>
            </svg>
            <h2 style="color: #ffffff; font-size: 26px; font-weight: 800; tracking-spacing: 0.5px; margin-top: 10px;">Pi Wallet Guard</h2>
            <div style="margin-top: 15px; color: #ffb300; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px;">Loading Secure Firewall...</div>
        </div>
    </div>

    <!-- MAIN PLATFORM INTERFACE -->
    <div id="mainContent" class="main-container">
        
        <!-- HEADER INTERFACE -->
        <header class="pi-purple-gradient">
            <div class="fake-url-bar">
                <div class="dots">
                    <div class="dot" style="background-color: #ef4444;"></div>
                    <div class="dot" style="background-color: #eab308;"></div>
                    <div class="dot" style="background-color: #22c55e;"></div>
                </div>
                <div class="url-field">pi://walletguard.pi</div>
            </div>
            
            <div class="header-main">
                <div class="brand-zone">
                    <!-- Vector Icon Miniature Fit -->
                    <svg class="logo-box-mini" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="48" fill="#2d0f54" stroke="#ffb300" stroke-width="4"/>
                        <path d="M50,22 C65,22 72,27 72,27 C72,55 50,78 50,78 C50,78 28,55 28,27 C28,27 35,22 50,22 Z" fill="#5c1d99" stroke="#ffb300" stroke-width="4"/>
                        <text x="50" y="59" font-size="32" fill="#ffffff" text-anchor="middle" font-weight="bold">π</text>
                    </svg>
                    <div>
                        <h1 style="font-size: 18px; font-weight: 800; letter-spacing: -0.3px;">PiWalletGuard</h1>
                        <p style="font-size: 10px; color: #ffb300; font-weight: 600;" id="t-tagline">Community Security Dashboard</p>
                    </div>
                </div>
                <div>
                    <select id="langSelect" onchange="setLanguage(this.value)" class="lang-dropdown"></select>
                </div>
            </div>
        </header>

        <!-- MAIN LAYOUT -->
        <main class="main-layout">
            
            <!-- LEFT COLUMN: INPUT SYSTEM -->
            <section class="left-panel">
                <div id="pwa-auth-zone" class="auth-container-box">
                    <p style="font-size: 12px; font-weight: 600; color: #b45309; margin-bottom: 8px;" id="t-auth-required">Pi Network Session Required</p>
                    <button id="manualConnectBtn" onclick="attemptPiAuth()" class="pi-gold-btn">
                        <span id="t-connect">Connect Pi Wallet</span>
                    </button>
                </div>

                <div class="form-card">
                    <div class="form-title">
                        <span style="color: #ffb300;">🛡️</span> <span id="t-formTitle">Report Malicious Wallet</span>
                    </div>
                    
                    <form id="reportForm" onsubmit="handleFormSubmit(event)">
                        <div class="form-group">
                            <label id="t-walletAddress">Malicious Pi Wallet Address</label>
                            <input type="text" id="walletAddress" required oninput="handleWalletAddressInput(this)" />
                        </div>
                        
                        <div class="grid-2">
                            <div class="form-group">
                                <label id="t-piUsername">Your Pi Username</label>
                                <input type="text" id="piUsername" required readonly class="input-readonly" />
                            </div>
                            <div class="form-group">
                                <label id="t-email">Email Address</label>
                                <input type="email" id="email" required />
                            </div>
                        </div>

                        <div class="grid-2">
                            <div class="form-group">
                                <label id="t-threatLevel">Threat Level</label>
                                <select id="threatLevel">
                                    <option value="Phishing" id="opt-phishing">Phishing / Fake Site</option>
                                    <option value="Passphrase" id="opt-passphrase">Passphrase Theft</option>
                                    <option value="P2P" id="opt-p2p">P2P Scam</option>
                                    <option value="Other" id="opt-other">Other Threat</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label id="t-amountStolen">Amount of PI Stolen</label>
                                <input type="number" id="amountStolen" step="any" min="0.00001" required />
                            </div>
                        </div>

                        <div class="form-group">
                            <label id="t-description">Description</label>
                            <textarea id="description" rows="3" required></textarea>
                        </div>

                        <div class="form-group">
                            <label id="t-proofs">Upload Evidence (Max 5)</label>
                            <div class="dropzone" onclick="document.getElementById('fileInput').click()">
                                <p id="t-dragText" style="font-size: 11px; color: #6b7280;">Click to upload images</p>
                                <input type="file" id="fileInput" multiple accept="image/*" style="display: none;" onchange="handleFiles(this.files)" />
                            </div>
                            <div id="previewContainer" style="display: flex; gap: 6px; margin-top: 8px;"></div>
                        </div>

                        <button type="submit" id="submitBtn" disabled class="submit-locked">
                            <span id="t-submitText">Connect Pi Wallet First</span>
                        </button>
                    </form>
                </div>
            </section>

            <!-- RIGHT COLUMN: MONITORING MONITOR -->
            <section class="right-panel">
                <div class="dashboard-header">
                    <h3 style="font-weight: 700; color: #374151;" id="t-dashboardTitle">Live Malicious Registry</h3>
                    <span class="badge-count" id="totalReportsBadge">0 Items</span>
                </div>
                <div id="registryContainer"></div>
            </section>
        </main>
    </div>

    <!-- CODE SCRIPT LOGIC LAYER -->
    <script>
        const translations = {
            en: {
                tagline: "Community Security Dashboard", connect: "Connect Pi Wallet", formTitle: "Report Malicious Wallet",
                walletAddress: "Malicious Pi Wallet Address", piUsername: "Your Pi Username", email: "Email Address",
                threatLevel: "Threat Level", optPhishing: "Phishing / Fake Site", optPassphrase: "Passphrase Theft",
                optP2P: "P2P Scam", optOther: "Other Threat", amountStolen: "Amount of PI Stolen",
                description: "Reason / Description", proofs: "Upload Evidence (Max 5)", dragText: "Click to upload images",
                submitText: "Submit Report", dashboardTitle: "Live Malicious Registry", submitDisabled: "Connect Pi Wallet First",
                scamConfirm: "Scam", safeReport: "Safe", reported: "Reported", times: "times",
                authRequired: "Pi Network Session Required"
            },
            fr: {
                tagline: "Tableau de Sécurité Communautaire", connect: "Connexion Pi Wallet", formTitle: "Signaler un Portefeuille Malveillant",
                walletAddress: "Adresse du Wallet Pi Incriminé", piUsername: "Votre Pseudo Pi Network", email: "Adresse Email",
                threatLevel: "Niveau de Menace", optPhishing: "Phishing / Faux Site", optPassphrase: "Vol de Passphrase",
                optP2P: "Arnaque P2P", optOther: "Autre Menace", amountStolen: "Montant PI Volé",
                description: "Description / Raison", proofs: "Section Preuves (Max 5)", dragText: "Cliquez pour ajouter des images",
                submitText: "Soumettre le Signalement", dashboardTitle: "Registre Actif des Menaces", submitDisabled: "Connectez votre Pi Wallet",
                scamConfirm: "Arnaque", safeReport: "Sûr", reported: "Signalé", times: "fois",
                authRequired: "Session Pi Network Requise"
            }
        };

        let currentLang = 'en';
        let currentUser = null;
        let reports = [];
        let uploadedImages = [];

        window.addEventListener('DOMContentLoaded', () => {
            initLanguageSelector();
            setLanguage('en');
            loadMockData();
            renderRegistry();
            
            // TIMEOUT TO SMOOTHLY TRANSITION FROM SPLASH TO CONTAINER
            setTimeout(() => {
                const splash = document.getElementById('splashScreen');
                const main = document.getElementById('mainContent');
                splash.style.opacity = '0';
                main.style.opacity = '1';
                main.style.transform = 'translateY(0)';
                setTimeout(() => splash.style.display = 'none', 500);
            }, 1800);

            try {
                Pi.init({ version: "2.0", sandbox: false });
            } catch (err) {
                console.log("Local initialization layout context checked.");
            }
        });

        function initLanguageSelector() {
            const select = document.getElementById('langSelect');
            const languages = { en: "English", fr: "Français", es: "Español", de: "Deutsch", zh: "简体中文" };
            Object.keys(languages).forEach(key => {
                let opt = document.createElement('option');
                opt.value = key;
                opt.innerText = languages[key];
                select.appendChild(opt);
            });
        }

        function setLanguage(lang) {
            currentLang = translations[lang] ? lang : 'en';
            const dict = translations[currentLang];
            
            document.getElementById('t-tagline').innerText = dict.tagline;
            if(!currentUser) {
                document.getElementById('t-connect').innerText = dict.connect;
                document.getElementById('t-auth-required').innerText = dict.authRequired;
            }
            document.getElementById('t-formTitle').innerText = dict.formTitle;
            document.getElementById('t-walletAddress').innerText = dict.walletAddress;
            document.getElementById('t-piUsername').innerText = dict.piUsername;
            document.getElementById('t-email').innerText = dict.email;
            document.getElementById('t-threatLevel').innerText = dict.threatLevel;
            document.getElementById('opt-phishing').innerText = dict.optPhishing;
            document.getElementById('opt-passphrase').innerText = dict.optPassphrase;
            document.getElementById('opt-p2p').innerText = dict.optP2P;
            document.getElementById('opt-other').innerText = dict.optOther;
            document.getElementById('t-amountStolen').innerText = dict.amountStolen;
            document.getElementById('t-description').innerText = dict.description;
            document.getElementById('t-proofs').innerText = dict.proofs;
            document.getElementById('t-dragText').innerText = dict.dragText;
            document.getElementById('t-dashboardTitle').innerText = dict.dashboardTitle;
            
            updateSubmitButtonState();
            renderRegistry();
        }

        async function attemptPiAuth() {
            try {
                const scopes = ['username'];
                const auth = await Pi.authenticate(scopes, onIncompletePaymentFound);
                currentUser = auth.user.username;
                
                document.getElementById('pwa-auth-zone').innerHTML = `
                    <div style="background-color: #ecfdf5; border: 1px solid #10b981; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: bold; color: #065f46; text-align: center;">
                        ✅ Connected Security Node: @${currentUser}
                    </div>`;
                
                document.getElementById('piUsername').value = '@' + currentUser;
                updateSubmitButtonState();
            } catch (error) {
                console.error("Pi Core auth bypass context handled:", error);
                if (!window.location.hostname.includes("minepi.com")) {
                    currentUser = "TestPioneer";
                    document.getElementById('pwa-auth-zone').innerHTML = `
                        <div style="background-color: #ecfdf5; border: 1px solid #10b981; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: bold; color: #065f46; text-align: center;">
                            ✅ Dev Standalone Connected: @${currentUser}
                        </div>`;
                    document.getElementById('piUsername').value = '@' + currentUser;
                    updateSubmitButtonState();
                }
            }
        }

        function onIncompletePaymentFound(payment) {}

        function updateSubmitButtonState() {
            const btn = document.getElementById('submitBtn');
            const txt = document.getElementById('t-submitText');
            const dict = translations[currentLang];

            if (!currentUser) {
                btn.disabled = true;
                btn.className = "submit-locked";
                txt.innerText = dict.submitDisabled;
            } else {
                btn.disabled = false;
                btn.className = "submit-active";
                txt.innerText = dict.submitText;
            }
        }

        function handleWalletAddressInput(input) {
            const val = input.value.trim();
            const regex = /^G[A-Z2-7]{55}$/;
            input.style.borderColor = regex.test(val) ? "#10b981" : "#ef4444";
        }

        function handleFiles(files) {
            const container = document.getElementById('previewContainer');
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    uploadedImages.push(e.target.result);
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.style.width = "40px";
                    img.style.height = "40px";
                    img.style.borderRadius = "4px";
                    container.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const targetAddress = document.getElementById('walletAddress').value.trim();
            const amount = parseFloat(document.getElementById('amountStolen').value);
            const desc = document.getElementById('description').value;

            let existing = reports.find(r => r.address === targetAddress);
            if(existing) {
                existing.recurrence += 1;
                existing.totalStolen += amount;
            } else {
                reports.unshift({ address: targetAddress, recurrence: 1, totalStolen: amount, upvotes: 0, downvotes: 0 });
            }

            localStorage.setItem('pi_wallet_reports', JSON.stringify(reports));
            document.getElementById('reportForm').reset();
            document.getElementById('previewContainer').innerHTML = '';
            document.getElementById('piUsername').value = '@' + currentUser;
            renderRegistry();
        }

        function handleVote(address, type) {
            let target = reports.find(r => r.address === address);
            if(!target) return;
            if(type === 'up') target.upvotes += 1;
            if(type === 'down') target.downvotes += 1;
            localStorage.setItem('pi_wallet_reports', JSON.stringify(reports));
            renderRegistry();
        }

        function renderRegistry() {
            const container = document.getElementById('registryContainer');
            const dict = translations[currentLang];
            container.innerHTML = '';
            document.getElementById('totalReportsBadge').innerText = `${reports.length} Item(s)`;

            reports.forEach(item => {
                const total = item.upvotes + item.downvotes;
                const pct = total > 0 ? Math.round((item.upvotes / total) * 100) : 50;

                let card = document.createElement('div');
                card.className = "scam-card";
                card.innerHTML = `
                    <div style="display: flex; flex-direction: column; gap: 6px; width: 100%;">
                        <span class="wallet-box">${item.address}</span>
                        <div style="display: flex; gap: 6px; align-items: center; justify-content: flex-start; margin-top: 2px;">
                            ${item.recurrence > 1 ? `<span class="badge-recurrence">⚠️ ${dict.reported} ${item.recurrence} ${dict.times}</span>` : ''}
                            <span class="badge-amount">${item.totalStolen} π</span>
                        </div>
                    </div>
                    <div class="vote-section">
                        <div style="flex: 1; width: 100%; margin-bottom: 6px;">
                            <div style="display: flex; justify-content: space-between; font-size: 10px
